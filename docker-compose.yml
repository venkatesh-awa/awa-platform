name: awa-platform

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: Awa_Local_Pw1!
    ports: ["1433:1433"]
    # Persist SQL Server data across container recreation. `docker compose down -v`
    # will still remove this named volume, but plain down/up keeps the database.
    volumes: ["mssql_data:/var/opt/mssql"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql: { condition: service_healthy }
    environment:
      MSSQL_SA_PASSWORD: Awa_Local_Pw1!
      AWA_APP_PASSWORD: mssql
    volumes:
      - "./infra/mssql/init_db.sh:/init_db.sh:ro"
      - "./infra/mssql/init_db.sql:/init_db.sql:ro"
    entrypoint: ["bash", "/init_db.sh"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: awa-local-dev-cluster
    volumes: ["kafka_data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka-topics-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka: { condition: service_healthy }
    volumes: ["./infra/kafka/create_topics.sh:/create_topics.sh:ro"]
    entrypoint: ["bash", "/create_topics.sh"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes: ["./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro"]
    ports: ["4317:4317"]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes: ["./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]

  # One-shot: brings the database schema to head (and seeds content on a fresh
  # volume) before the backend/worker start. Without this, a recreated mssql
  # volume comes up empty and every content/auth endpoint 500s until someone
  # runs alembic by hand.
  migrate:
    build: { context: . }
    command: ["python", "-m", "alembic", "upgrade", "head"]
    env_file: ./.env.example
    environment:
      DATABASE_URL: mssql+aioodbc://mssql:mssql@mssql:1433/awa?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mssql-init: { condition: service_completed_successfully }

  backend:
    build: { context: . }
    env_file: ./.env.example
    environment:
      DATABASE_URL: mssql+aioodbc://mssql:mssql@mssql:1433/awa?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
    ports: ["8000:8000"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  auction-worker:
    build: { context: . }
    command: ["python", "-m", "workers.auction_worker"]
    env_file: ./.env.example
    environment:
      DATABASE_URL: mssql+aioodbc://mssql:mssql@mssql:1433/awa?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    # This service uses the API image but does not run the HTTP server, so the
    # Dockerfile's /livez healthcheck is only valid for `backend`.
    healthcheck:
      disable: true

# The UI now lives in the sibling awa-platform-ui project. Run it separately
# with `npm run dev` (proxies to this backend on :8000, see its
# vite.config.ts) - no CORS setup needed for local dev. For a combined
# docker-compose stack, add its service back here pointing at that repo's
# path, e.g. `build: { context: ../awa-platform-ui }`.

volumes:
  mssql_data:
  kafka_data:
