# The WebSocket gateway is deployed separately from the REST API (see
# architecture doc Section 6) because it scales on connection count, not
# CPU/RPS. In this scaffold it runs the same FastAPI image (the /ws route
# lives in the same app) - split into its own image/entrypoint once traffic
# justifies dedicated tuning (see architecture doc Section 16 evolution path).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: awa-ws-gateway
  namespace: awa-platform
  labels: { app: awa-ws-gateway }
spec:
  replicas: 4
  selector:
    matchLabels: { app: awa-ws-gateway }
  template:
    metadata:
      labels: { app: awa-ws-gateway }
    spec:
      containers:
        - name: awa-ws-gateway
          image: awa-backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: awa-backend-config }
            - secretRef: { name: awa-backend-secrets }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /api/v1/livez, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/v1/readyz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: awa-ws-gateway
  namespace: awa-platform
spec:
  selector: { app: awa-ws-gateway }
  ports:
    - port: 8000
      targetPort: 8000
---
# Requires the Prometheus Adapter (or KEDA) to expose a custom
# websocket_active_connections metric for HPA to scale on - see architecture
# doc Section 9.1 for the reference HPA spec. Falls back to CPU-based scaling
# below until that custom metric pipeline is wired up.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: awa-ws-gateway-hpa
  namespace: awa-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: awa-ws-gateway
  minReplicas: 4
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
