apiVersion: v1
kind: Namespace
metadata:
  name: awa-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: awa-backend
  namespace: awa-platform
  labels: { app: awa-backend }
spec:
  replicas: 3
  selector:
    matchLabels: { app: awa-backend }
  template:
    metadata:
      labels: { app: awa-backend }
    spec:
      containers:
        - name: awa-backend
          image: awa-backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: awa-backend-config }
            - secretRef: { name: awa-backend-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /api/v1/livez, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/v1/readyz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: awa-backend
  namespace: awa-platform
spec:
  selector: { app: awa-backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: awa-backend-hpa
  namespace: awa-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: awa-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
