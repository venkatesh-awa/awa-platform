receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # Local dev: log spans to stdout. Swap for an OTLP exporter pointed at
  # your APM backend (Jaeger, Tempo, Datadog, etc.) in staging/production.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
